<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常害虫リスクMAP</title>
    <!-- 無料で使える地図ライブラリ Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .control-panel {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 12px 18px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; gap: 10px;
            backdrop-filter: blur(5px);
        }
        button {
            padding: 10px 16px; font-weight: bold; border: none;
            border-radius: 20px; cursor: pointer; color: white; font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-tick { background-color: #e63946; }
        .btn-mos { background-color: #457b9d; }
        
        /* ポップアップ内の削除ボタン用スタイル */
        .delete-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
            font-weight: bold;
        }
        .delete-btn:hover {
            background-color: #e63946;
        }
    </style>
</head>
<body>
<!-- 地図の上に表示される「ガイドページへのリンクバナー」 -->
<div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px;">
    <a href="guide.html" style="display: block; background: #1d3557; color: white; text-align: center; padding: 10px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        🚨 マダニに刺されたら？対処法＆対策グッズを見る →
    </a>
</div>
    <!-- 地図エリア -->
    <div id="map"></div>

    <!-- 投稿用ボタン -->
    <div class="control-panel">
        <button class="btn-tick" onclick="reportInsect('マダニ')">📍 マダニ目撃</button>
        <button class="btn-mos" onclick="reportInsect('蚊')">📍 蚊の大量発生</button>
    </div>

    <script>
        // 1. 地図の初期化
        const map = L.map('map').setView([35.6812, 139.7671], 15);

        // 2. 無料の地図タイル（OpenStreetMap）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // GPSで現在地を取得
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                map.setView([lat, lng], 16);
                
                L.circle([lat, lng], { 
                    radius: 12, 
                    fillColor: '#2a9d8f', 
                    color: '#fff', 
                    weight: 2, 
                    fillOpacity: 0.8 
                }).addTo(map).bindPopup("<b>📍 あなたの現在地</b>");
            });
        }

        // ユニークIDを生成する関数（削除管理用）
        function generateId() {
            return '_' + Math.random().toString(36).substr(2, 9);
        }

        // 3. 投稿機能（削除ボタン付き）
        function reportInsect(type) {
            const center = map.getCenter();
            const color = (type === 'マダニ') ? '#e63946' : '#457b9d';
            const id = generateId(); // このピン専用のIDを作成

            // ピンの追加
            const marker = L.circleMarker(center, {
                radius: 14,
                fillColor: color,
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.85
            }).addTo(map);

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // ポップアップの内容（削除ボタンを埋め込み）
            const popupContent = `
                <div style="text-align: center;">
                    <b style="color: ${color};">【🚨${type}報告】</b><br>
                    <small>投稿時間: ${now}</small><br>
                    <button class="delete-btn" onclick="removeMarker('${id}')">🗑️ 誤投稿を消去する</button>
                </div>
            `;

            marker.bindPopup(popupContent).openPopup();

            // グローバル変数にマーカーを保持（削除できるように）
            window[id] = marker;

            // アラート表示
            alert(`「${type}」を報告しました。\nもし誤って登録した場合は、作成されたピンをタップして「消去」できます。`);
        }

        // 4. ピンを削除する関数
        function removeMarker(id) {
            if (confirm("この投稿を削除（消去）しますか？")) {
                const marker = window[id];
                if (marker) {
                    map.removeLayer(marker); // 地図から消去
                    delete window[id]; // メモリから消去
                    alert("投稿を消去しました。");
                }
            }
        }
    </script>
</body>
</html>
